<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru 2: Harmonic Oscillator Simulation</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; margin: 0; }
        .header { margin: 20px; text-align: center; }
        .main-container { display: flex; width: 95%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .visual-area { width: 50%; border-right: 1px solid #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .chart-area { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        #animation { width: 400px; height: 150px; background: #fafafa; border: 1px solid #eee; position: relative; overflow: hidden; }
        #mass { width: 50px; height: 50px; background: #c0392b; position: absolute; top: 50px; left: 175px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #spring { width: 150px; height: 10px; background: repeating-linear-gradient(90deg, #7f8c8d, #7f8c8d 5px, #bdc3c7 5px, #bdc3c7 10px); position: absolute; top: 70px; left: 25px; transform-origin: left; }
        .energy-bar { width: 100%; height: 20px; background: #eee; border-radius: 10px; margin: 10px 0; position: relative; overflow: hidden; }
        #k_bar { height: 100%; background: #27ae60; position: absolute; left: 0; width: 50%; }
        #u_bar { height: 100%; background: #2980b9; position: absolute; right: 0; width: 50%; }
        .label { font-size: 0.9em; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="header">
    <h2>Section 2 - Problem 2: Mass-Spring Oscillator</h2>
    <p>Equation: x(t) = 0.2·cos(10πt) [m], Mass = 10 kg</p>
</div>

<div class="main-container">
    <div class="visual-area">
        <label class="label">Physical Animation</label>
        <div id="animation">
            <div id="spring"></div>
            <div id="mass"></div>
        </div>
        <div style="width:100%; margin-top:20px; border:1px solid #ddd; padding:10px;">
            <label class="label">Total Mechanical Energy (E): 19.74 J</label>
            <div class="energy-bar"><div id="e_bar" style="height:100%; background:#d35400; width:100%;"></div></div>
            <label class="label">Kinetic (K - Green) vs. Potential (U - Blue)</label>
            <div class="energy-bar"><div id="k_bar"></div><div id="u_bar"></div></div>
        </div>
    </div>
    
    <div class="chart-area">
        <div id="timeChart" style="height:250px;"></div>
        <div id="phaseChart" style="height:250px;"></div>
    </div>
</div>

<script>
    // System Constants from Problem 2
    const A = 0.2; // Amplitude [m]
    const w_d = 10 * Math.PI; // Angular Frequency [rad/s]
    const m = 10.0; // Mass [kg]
    const k = m * Math.pow(w_d, 2); // Spring Constant [N/m] ≈ 9869.6
    const E_total = 0.5 * k * Math.pow(A, 2); // Total Energy [J] ≈ 19.74
    let time = 0;
    const dt = 0.01;

    // Animation Elements
    const massEl = document.getElementById('mass');
    const springEl = document.getElementById('spring');
    const kBarEl = document.getElementById('k_bar');
    const uBarEl = document.getElementById('u_bar');

    // Chart Data
    let t_vals = [], x_vals = [], v_vals = [];
    const max_t = 1.0; // Show one full period (T = 0.2s)

    function update() {
        // Analytical Solution
        const x = A * Math.cos(w_d * time);
        const v = -A * w_d * Math.sin(w_d * time);
        
        // Energetics
        const U = 0.5 * k * Math.pow(x, 2);
        const K = 0.5 * m * Math.pow(v, 2);

        // Update Animation (Visuals)
        const visual_scale = 500; // Scale position [m] to pixels
        const massX = 175 + x * visual_scale; // Center + displacement
        massEl.style.left = `${massX}px`;
        const springWidth = 150 + x * visual_scale;
        springEl.style.width = `${springWidth}px`;

        // Update Energy Bars
        const kPercentage = (K / E_total) * 100;
        kBarEl.style.width = `${kPercentage}%`;
        uBarEl.style.width = `${100 - kPercentage}%`;

        // Update Charts (Show last max_t seconds)
        t_vals.push(time);
        x_vals.push(x);
        v_vals.push(v);
        
        // Maintain Chart Window
        if (time > max_t) {
            t_vals.shift();
            x_vals.shift();
            v_vals.shift();
        }

        Plotly.newPlot('timeChart', [{
            x: t_vals, y: x_vals, name: 'Position x(t)', line: {color: '#1f77b4', width: 3}
        }], {
            title: 'Position vs Time', xaxis: {title: 'Time (s)', zeroline: true}, yaxis: {title: 'Position (m)', range: [-0.25, 0.25]}
        });

        Plotly.newPlot('phaseChart', [{
            x: x_vals, y: v_vals, mode: 'lines', name: 'Phase Space', line: {color: '#d62728', shape: 'spline'}
        }, {
            x: [x], y: [v], mode: 'markers', name: 'Current State', marker: {size: 12, color: 'black'}
        }], {
            title: 'Phase Space (v vs x)', xaxis: {title: 'Position (m)', range: [-0.25, 0.25]}, yaxis: {title: 'Velocity (m/s)', range: [-7, 7]}
        });

        time += dt;
        requestAnimationFrame(update);
    }

    // Start Animation
    update();
</script>

</body>
</html>
